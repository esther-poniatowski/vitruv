name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install black pylint mypy pytest pytest-cov types-PyYAML
      - name: Check formatting (black)
        run: black --check --config config/tools/black.toml src/ tests/
      - name: Run linter (pylint)
        run: pylint --rcfile=config/tools/pylintrc.ini src/
      - name: Run type checker (mypy)
        run: mypy --config-file config/tools/mypy.ini src/
      - name: Run tests
        run: pytest tests/ -v --cov --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
  docs:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install sphinx myst-parser sphinx-rtd-theme
      - name: Build documentation
        run: sphinx-build -b html docs/ docs/_build/html
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html/
